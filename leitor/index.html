<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proteção Básica — Leitor de boleto</title>
<style>
  :root{
    --verde-escuro:#1A4314; --verde-medio:#447A2D; --verde-vivo:#32BF2E;
    --bg:#0e2a0c; --card:#14380f; --linha:#2a5a22; --txt:#e8f3e2; --txt2:#a9c7a0;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:24px 16px;line-height:1.5}
  .wrap{max-width:520px;margin:0 auto}
  .logo-container { text-align: center; margin-bottom: 20px; }
  .logo { font-size: 32px; font-weight: bold; color: var(--verde-vivo); letter-spacing: -1px; }
  .logo span { color: #FFFFFF; font-weight: 300; font-size: 28px; margin-left: 4px; }
  h1{font-size:19px;font-weight:600;margin:0 0 4px;text-align:center}
  .sub{color:var(--txt2);font-size:13px;margin:0 0 18px;text-align:center}
  #drop{border:1.5px dashed var(--verde-medio);border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;background:rgba(255,255,255,.02)}
  #drop.over{border-color:var(--verde-vivo);background:rgba(50,191,46,.08)}
  #drop strong{display:block;font-size:15px;margin-bottom:2px}
  #drop span{color:var(--txt2);font-size:12px}
  .ou{display:flex;align-items:center;gap:10px;margin:16px 0 10px;font-size:14px;font-weight:600}
  .ou::before,.ou::after{content:'';flex:1;height:1px;background:var(--linha)}
  .colar{display:flex;gap:8px}
  .colar input{flex:1;min-width:0;padding:11px;border-radius:8px;border:1px solid var(--linha);background:var(--bg);color:var(--txt);font-size:14px}
  .colar button{padding:11px 18px;border-radius:8px;border:1px solid var(--verde-vivo);background:var(--verde-vivo);color:#0e2a0c;font-weight:600;cursor:pointer;font-size:14px}
  .result{margin-top:20px;border-radius:12px;padding:18px;display:none}
  .result.show{display:block}
  .selo{font-size:17px;font-weight:600;margin-bottom:14px}
  .verde{background:rgba(50,191,46,.10);border:1px solid #2e7d32}
  .amarelo{background:rgba(240,180,40,.10);border:1px solid #b78a17}
  .vermelho{background:rgba(226,75,74,.10);border:1px solid #a32d2d}
  .checks{display:flex;flex-direction:column;gap:11px}
  .chk{display:flex;gap:10px;font-size:13px;align-items:flex-start}
  .nota,.aviso{font-size:12px;color:var(--txt2);margin-top:14px}
  .lead{margin-top:16px;display:none}
  .lead.show{display:block}
  .lead input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--linha);background:var(--bg);color:var(--txt);font-size:14px;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-container"><div class="logo">olho<span>NA GARANTIA</span></div></div>
  <h1>Confira seu boleto</h1>
  <p class="sub">O arquivo nunca sai do seu computador. A leitura acontece aqui no navegador.</p>
  <div id="drop">
    <strong>Arraste seu boleto em PDF aqui</strong>
    <span>ou clique para selecionar</span>
    <input type="file" id="file" accept="application/pdf" hidden>
  </div>
  <div class="ou">ou cole a linha digitável do boleto</div>
  <div class="colar">
    <input type="text" id="manual" placeholder="Ex.: 34191.09180 58209.952934 ...">
    <button id="btn">Conferir</button>
  </div>
  <div id="result" class="result">
    <div class="selo" id="selo"></div>
    <div class="checks" id="checks"></div>
    <p class="nota">Conferimos a integridade do boleto. Não comparamos com seu histórico.</p>
    <div class="lead" id="lead">
      <input type="text" id="whats" placeholder="Seu WhatsApp (opcional)">
    </div>
  </div>
</div>

<script src="https://cloudflare.com"></script>
<script>
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

async function extrairTexto(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let texto='';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    texto += content.items.map(it=>it.str).join(' ')+' ';
  }
  return texto;
}

function dvMod10(num){
  let soma=0, peso=2;
  for(let i=num.length-1;i>=0;i--){ 
    let n=(+num[i])*peso; 
    if(n>9) n=Math.floor(n/10)+(n%10); 
    soma+=n; peso=peso===2?1:2; 
  }
  return (10-(soma%10))%10;
}

// NOVA LÓGICA: Pesos calculados via código para nunca mais cortar no chat
function calcularMod11Base(num, isArr) {
  let soma=0, p=0;
  for(let i=num.length-1;i>=0;i--){
    let peso = 2 + (p % 8);
    soma += (+num[i]) * peso;
    p++;
  }
  let resto = soma % 11;
  if(isArr) {
    let dv = 11 - resto;
    return (dv===0||dv===10||dv===11) ? 0 : dv;
  } else {
    let dv = 11 - resto;
    return (dv===0||dv===10||dv===11) ? 1 : dv;
  }
}
function dvMod11(barra){ return calcularMod11Base(barra, false); }
function dvMod11Arr(num){ return calcularMod11Base(num, true); }

function cobrancaDvOk(l){
  if(l.length !== 47) return false;
  if(dvMod10(l.slice(0,9))!==+l[9]) return false;
  if(dvMod10(l.slice(10,20))!==+l[20]) return false;
  if(dvMod10(l.slice(21,31))!==+l[31]) return false;
  const barra43 = l.slice(0,4)+l.slice(33,47)+l.slice(4,9)+l.slice(10,20)+l.slice(21,31);
  return dvMod11(barra43)===+l[32];
}

function blocosArrecadacaoOk(s){
  if(s.length !== 48) return false;
  for(let b=0;b<4;b++){ 
    const bl=s.slice(b*12,b*12+12); 
    const calc= (s[2]==='8'||s[2]==='9') ? dvMod11Arr(bl.slice(0,11)) : dvMod10(bl.slice(0,11)); 
    if(calc!==+bl[11]) return false; 
  }
  return true;
}

function acharLinha(texto){
  const cands = (texto.match(/[\d.\s]{40,}/g)||[]).map(c=>c.replace(/\D/g,'')).filter(d=>d.length>=47);
  let fallback=null;
  for(const d of cands){
    for(let i=0;i+48<=d.length;i++){ const s=d.slice(i,i+48); if(s[0]==='8'){ if(blocosArrecadacaoOk(s)) return s; if(!fallback) fallback=s; } }
    for(let i=0;i+47<=d.length;i++){ const s=d.slice(i,i+47); if(cobrancaDvOk(s)) return s; }
    if(!fallback && d.length>=47) fallback=d.slice(0,47);
  }
  return fallback;
}

const BANCOS={'001':'Banco do Brasil','033':'Santander','104':'Caixa','237':'Bradesco','341':'Itaú','260':'Nubank','077':'Inter'};

function lerCobranca(l){
  const banco=l.slice(0,3);
  const valor=(+l.slice(37,47))/100;
  return {tipo:'Boleto bancário',banco:BANCOS[banco]||('Banco '+banco),valor,dvOk:cobrancaDvOk(l)};
}
function lerArrecadacao(s){
  let barra=''; for(let b=0;b<4;b++) barra+=s.slice(b*12,b*12+11);
  return {tipo:'Conta de concessionária',valor:(+barra.slice(4,15))/100,dvOk:blocosArrecadacaoOk(s)};
}

function analisar(l){
  const d=(l.length===48&&l[0]==='8')?lerArrecadacao(l):lerCobranca(l);
  let nivel = !d.dvOk ? 'vermelho' : (d.valor===0 ? 'amarelo' : 'verde');
  let msg = !d.dvOk ? 'Atenção: código inválido' : 'Boleto estruturalmente íntegro';
  return {nivel, msg, dados:d};
}

function chk(estado, titulo, detalhe){
  const ic={ok:'✓', warn:'!', bad: 'X'}[estado] || 'ℹ';
  const cor={ok:'#7be36f', warn:'#f0c04a', bad: '#ef8b8b'}[estado] || '#fff';
  return '<div class="chk"><span style="color:'+cor+'">'+ic+'</span><div><b>'+titulo+'</b><br><span class="det">'+detalhe+'</span></div></div>';
}

const drop=document.getElementById('drop'), input=document.getElementById('file');
const result=document.getElementById('result'), selo=document.getElementById('selo'), checks=document.getElementById('checks');

function mostrar(r){
  const d=r.dados;
  result.className='result show '+r.nivel;
  selo.textContent=r.msg;
  let h=chk(d.dvOk?'ok':'bad', 'Código de barras', d.dvOk?'Linha matemática válida':'Dígito verificador incorreto');
  if(d.banco) h+=chk('ok', 'Emissor', d.banco);
  if(d.valor) h+=chk('ok', 'Valor', 'R$ '+d.valor.toFixed(2).replace('.',','));
  checks.innerHTML=h;
}

drop.addEventListener('click', () => { input.click(); });
drop.ondragover=e=>{e.preventDefault(); drop.classList.add('over')};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault(); drop.classList.remove('over'); if(e.dataTransfer.files.length > 0) processar(e.dataTransfer.files[0]); };
input.onchange=()=>{if(input.files.length > 0) processar(input.files[0]); };

async function processar(file){
  selo.textContent='Lendo...'; result.className='result show'; checks.innerHTML='';
  try{
    const texto = await extrairTexto(file);
    const linha = acharLinha(texto);
    if(!linha){ 
      result.className='result show amarelo'; selo.textContent='Linha não encontrada';
      return;
    }
    mostrar(analisar(linha));
  }catch(err){
    result.className='result show vermelho'; selo.textContent='Erro ao ler o PDF';
  }
}

document.getElementById('btn').onclick=()=>{
  const val = document.getElementById('manual').value.replace(/\D/g,'');
  if(val.length>=47) mostrar(analisar(val));
};
</script>
</body>
</html>
